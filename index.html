<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是哪一種嘉義串？｜文化＋1串！</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');
:root{
  --black:#111;--white:#FAFAFA;--y:#F5E642;
  --c1:#FF6B00;--c2:#FF3D00;--c3:#E8409A;--c4:#3DAA2A;
  --c5:#FF6B00;--c6:#FFAA3B;--c7:#E8409A;--c8:#3DAA2A;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Noto Serif TC',serif;min-height:100vh;overflow-x:hidden;}

/* ── SPLASH ── */
#splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden;}
.bg-strips{position:absolute;inset:0;display:flex;}
.bg-strip{flex:1;opacity:0.07;}
.s1{background:#FF6B00;}.s2{background:#FF3D00;}.s3{background:#E8409A;}.s4{background:#3DAA2A;}
.s5{background:#FFD580;}.s6{background:#FFAA3B;}.s7{background:#FF8C42;}.s8{background:#FF3D00;}
.splash-badge{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.3em;color:var(--y);border:1px solid var(--y);padding:.3rem 1rem;margin-bottom:2rem;text-transform:uppercase;animation:fadeUp .6s ease both;}
.splash-title{font-size:clamp(2.4rem,7vw,5rem);font-weight:900;line-height:1;text-align:center;animation:fadeUp .6s .1s ease both;}
.splash-title .accent{color:var(--y);display:block;}
.splash-sub{margin-top:1.5rem;font-size:1rem;color:#aaa;text-align:center;line-height:1.8;max-width:440px;animation:fadeUp .6s .2s ease both;}
.start-btn{margin-top:3rem;background:var(--white);color:var(--black);border:none;padding:1.1rem 3.5rem;font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:900;cursor:pointer;letter-spacing:.1em;transition:background .2s,transform .15s;animation:fadeUp .6s .3s ease both;border-radius:4px;}
.start-btn:hover{background:var(--y);transform:scale(1.04);}

/* ── QUIZ ── */
#quiz{display:none;min-height:100vh;padding:2rem 1rem 4rem;max-width:680px;margin:0 auto;}
.progress-bar-wrap{height:4px;background:#333;margin-bottom:.6rem;border-radius:2px;}
.progress-bar-fill{height:100%;background:var(--y);transition:width .4s ease;border-radius:2px;}
.progress-label{font-family:'Space Mono',monospace;font-size:.7rem;color:#666;margin-bottom:2.5rem;letter-spacing:.15em;}
.question-block{animation:fadeUp .4s ease both;}
.q-number{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--y);letter-spacing:.3em;margin-bottom:1rem;}
.q-scene{font-size:.82rem;color:#666;margin-bottom:.6rem;font-style:italic;line-height:1.6;}
.q-text{font-size:clamp(1.1rem,3vw,1.45rem);font-weight:700;line-height:1.5;margin-bottom:2rem;}
.options{display:flex;flex-direction:column;gap:.75rem;}
.option-btn{background:transparent;border:1px solid #333;color:var(--white);padding:1rem 1.4rem;text-align:left;font-family:'Noto Serif TC',serif;font-size:.95rem;line-height:1.5;cursor:pointer;transition:border-color .2s,background .2s,transform .1s;position:relative;border-radius:4px;}
.option-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .2s;border-radius:3px 0 0 3px;}
.option-btn:hover{border-color:var(--y);background:rgba(245,230,66,.05);transform:translateX(4px);}
.option-btn:hover::before{background:var(--y);}
.back-q-btn{background:transparent;border:none;color:#555;padding:.6rem 0 0;font-family:'Noto Serif TC',serif;font-size:.82rem;cursor:pointer;transition:color .2s;letter-spacing:.05em;display:block;margin-top:.5rem;}
.back-q-btn:hover{color:#aaa;}

/* ── RESULT ── */
#result{display:none;min-height:100vh;}
.result-hero{padding:3.5rem 2rem 2.5rem;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden;}
.result-hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.12) 2px,transparent 2px);background-size:22px 22px;}
.rh-1{background:#FF6B00;}.rh-2{background:#FF3D00;}.rh-3{background:#E8409A;}
.rh-4{background:#FF6B00;}.rh-5{background:#FF3D00;}.rh-6{background:#E8409A;}
.rh-7{background:#3DAA2A;}.rh-8{background:#FFAA3B;}
.result-tag{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.3em;padding:.3rem .8rem;border:1.5px solid rgba(255,255,255,.5);margin-bottom:1.2rem;opacity:.85;animation:fadeUp .5s ease both;position:relative;z-index:1;border-radius:99px;}
.result-icon{font-size:5rem;margin-bottom:.6rem;animation:fadeUp .5s .05s ease both,floatAnim 3s ease-in-out infinite;position:relative;z-index:1;}
@keyframes floatAnim{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.rarity-badge{font-family:'Space Mono',monospace;font-size:.65rem;padding:.25rem .9rem;background:rgba(0,0,0,.25);border-radius:99px;margin-bottom:.8rem;letter-spacing:.1em;animation:fadeUp .5s .08s ease both;position:relative;z-index:1;}
.result-type-name{font-size:clamp(1.6rem,4.5vw,2.8rem);font-weight:900;line-height:1.1;animation:fadeUp .5s .1s ease both;max-width:500px;position:relative;z-index:1;}
.result-subtitle{font-size:.85rem;margin-top:.7rem;opacity:.7;animation:fadeUp .5s .2s ease both;position:relative;z-index:1;letter-spacing:.05em;}
.result-body{background:var(--black);color:var(--white);padding:2.5rem 1.5rem 4rem;max-width:680px;margin:0 auto;}
.result-desc{font-size:1rem;line-height:1.9;color:#ddd;margin-bottom:1.5rem;animation:fadeUp .5s .3s ease both;}
.result-other-desc{font-size:.9rem;line-height:1.8;color:#aaa;margin-bottom:2rem;border-left:2px solid #2a2a2a;padding-left:1rem;animation:fadeUp .5s .32s ease both;}
.section-label{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.3em;color:#666;margin-bottom:.8rem;margin-top:2rem;}
.tags-wrap{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.5rem;animation:fadeUp .5s .38s ease both;}
.flag-tag{font-size:.78rem;color:#888;border:1px solid #2a2a2a;padding:.3rem .7rem;border-radius:99px;}
.result-spots{display:flex;flex-direction:column;gap:0;margin-bottom:2rem;animation:fadeUp .5s .35s ease both;}
.spot-row{display:flex;align-items:center;gap:.8rem;padding:.75rem 0;border-bottom:1px solid #1e1e1e;}
.spot-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.spot-name{font-size:.9rem;color:#ddd;font-weight:700;}
.partner-wrap{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:2rem;animation:fadeUp .5s .4s ease both;}
.partner-card{border:1px solid #1e1e1e;padding:.9rem 1rem;border-radius:8px;}
.partner-label{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.2em;color:#555;margin-bottom:.5rem;}
.partner-names{font-size:.85rem;color:#ccc;line-height:1.6;}
.quote-block{border-left:3px solid var(--y);padding:.8rem 1.2rem;margin-bottom:2rem;font-size:.95rem;color:#ccc;font-style:italic;line-height:1.7;animation:fadeUp .5s .42s ease both;}
.share-hint{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.2em;color:#555;text-align:center;margin-bottom:1rem;}
.retry-btn{background:transparent;border:1px solid #444;color:#888;padding:.9rem 2.5rem;font-family:'Noto Serif TC',serif;font-size:.9rem;cursor:pointer;transition:border-color .2s,color .2s;letter-spacing:.1em;display:block;margin:2rem auto 0;border-radius:4px;}
.retry-btn:hover{border-color:var(--white);color:var(--white);}

/* ── ADMIN ── */
#admin{display:none;min-height:100vh;padding:3rem 1.5rem;max-width:800px;margin:0 auto;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem;}
.admin-title{font-size:1.4rem;font-weight:900;}
.admin-sub{font-family:'Space Mono',monospace;font-size:.62rem;color:#666;letter-spacing:.2em;margin-top:.3rem;}
.refresh-btn{background:transparent;border:1px solid #444;color:#aaa;padding:.6rem 1.2rem;font-family:'Space Mono',monospace;font-size:.7rem;cursor:pointer;letter-spacing:.1em;transition:border-color .2s,color .2s;}
.refresh-btn:hover{border-color:var(--y);color:var(--y);}
.stat-total-row{border-top:1px solid #222;padding-top:1.5rem;display:flex;align-items:baseline;gap:.8rem;margin-bottom:2rem;}
.stat-total-num{font-size:2rem;font-weight:900;font-family:'Space Mono',monospace;color:var(--y);}
.stat-total-label{color:#666;font-size:.85rem;}
.stats-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:3rem;}
.stat-row{display:grid;grid-template-columns:1fr 60px 80px;align-items:center;gap:1rem;padding:.9rem 1rem;border:1px solid #1e1e1e;}
.stat-name{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:.6rem;}
.stat-num{font-family:'Space Mono',monospace;font-size:.8rem;color:#888;text-align:right;}
.stat-pct{font-family:'Space Mono',monospace;font-size:.75rem;color:#555;}
.admin-loading{color:#666;font-size:.9rem;text-align:center;padding:3rem;}
.back-btn{background:transparent;border:1px solid #333;color:#888;padding:.8rem 1.8rem;font-family:'Noto Serif TC',serif;font-size:.85rem;cursor:pointer;transition:border-color .2s,color .2s;border-radius:4px;}
.back-btn:hover{border-color:var(--white);color:var(--white);}
.pw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;}
.pw-overlay.active{display:flex;}
.pw-box{background:#1a1a1a;border:1px solid #333;padding:2.5rem;width:90%;max-width:360px;text-align:center;border-radius:12px;}
.pw-title{font-weight:700;font-size:1.1rem;margin-bottom:.5rem;}
.pw-sub{color:#666;font-size:.85rem;margin-bottom:1.5rem;}
.pw-input{width:100%;background:#111;border:1px solid #333;color:var(--white);padding:.8rem 1rem;font-size:1rem;text-align:center;letter-spacing:.2em;margin-bottom:1rem;font-family:'Space Mono',monospace;border-radius:4px;}
.pw-input:focus{outline:none;border-color:var(--y);}
.pw-btn{width:100%;background:var(--y);color:var(--black);border:none;padding:.9rem;font-weight:900;font-size:1rem;cursor:pointer;font-family:'Noto Serif TC',serif;border-radius:4px;}
.pw-error{color:#FF4A1C;font-size:.8rem;margin-top:.75rem;display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:480px){.splash-title{font-size:2.2rem;}.result-type-name{font-size:1.6rem;}.partner-wrap{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- SPLASH -->
<section id="splash">
  <div class="bg-strips">
    <div class="bg-strip s1"></div><div class="bg-strip s2"></div>
    <div class="bg-strip s3"></div><div class="bg-strip s4"></div>
    <div class="bg-strip s5"></div><div class="bg-strip s6"></div>
    <div class="bg-strip s7"></div><div class="bg-strip s8"></div>
  </div>
  <div class="splash-badge">文化＋1串！心理測驗</div>
  <h1 class="splash-title">你是哪一種<span class="accent">嘉義串？</span></h1>
  <p class="splash-sub">你收到一封神秘邀請——「嘉義串燒辦桌」。<br>10道題，找到你最對味的那一支。</p>
  <button class="start-btn" onclick="startQuiz()">開始串！→</button>
</section>

<!-- QUIZ -->
<section id="quiz">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">Q 1 / 10</div>
  <div id="questionArea"></div>
</section>

<!-- RESULT -->
<section id="result">
  <div class="result-hero" id="resultHero">
    <div class="result-tag" id="resultTag"></div>
    <div class="result-icon" id="resultIcon"></div>
    <div class="rarity-badge" id="rarityBadge"></div>
    <div class="result-type-name" id="resultName"></div>
    <div class="result-subtitle" id="resultSubtitle"></div>
  </div>
  <div class="result-body">
    <div class="section-label">性格描述</div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="section-label">別人眼中的你</div>
    <div class="result-other-desc" id="resultOther"></div>
    <div class="section-label">FLAG</div>
    <div class="tags-wrap" id="resultTags"></div>
    <div class="section-label">推薦站點</div>
    <div class="result-spots" id="resultSpots"></div>
    <div class="section-label">旅伴配對</div>
    <div class="partner-wrap" id="resultPartner"></div>
    <div class="section-label">金句</div>
    <div class="quote-block" id="resultQuote"></div>
    <div class="share-hint">截圖分享你的結果 ↑</div>
    <button class="retry-btn" onclick="resetQuiz()">再測一次</button>
  </div>
</section>

<!-- ADMIN -->
<section id="admin">
  <div class="admin-header">
    <div>
      <div class="admin-title">📊 後台統計</div>
      <div class="admin-sub">文化＋1串！心理測驗</div>
    </div>
    <div style="display:flex;gap:.7rem;">
      <button class="refresh-btn" onclick="loadAdmin()">重新整理</button>
      <button class="back-btn" onclick="showSplash()">← 回首頁</button>
    </div>
  </div>
  <div class="stat-total-row">
    <div class="stat-total-num" id="adminTotal">—</div>
    <div class="stat-total-label">總作答人數</div>
  </div>
  <div class="stats-list" id="adminStats"><div class="admin-loading">載入中…</div></div>
</section>

<!-- PASSWORD OVERLAY -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <div class="pw-title">後台管理</div>
    <div class="pw-sub">請輸入密碼</div>
    <input class="pw-input" type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">進入</button>
    <div class="pw-error" id="pwError">密碼錯誤，請再試一次。</div>
  </div>
</div>

<script>
// ── 10題題目 ──
const questions = [
  {
    id:'Q1', dim:'EI',
    scene:'出發前一天晚上',
    text:'你打開 E-mail，收到嘉義一封神秘信件：「嘉義串燒辦桌」派對邀請，你會怎麼做？',
    options:[
      {text:'丟到朋友大群問，有誰要一起去玩啊', score:{E:1}},
      {text:'傳訊息問最好的朋友，要不要一起去', score:{E:1}},
      {text:'覺得活動很有趣，還在考慮有沒有要去', score:{I:1}},
      {text:'對「自己一人去」感到自在', score:{I:1}},
    ]
  },
  {
    id:'Q2', dim:'JP',
    scene:'邀請卡資訊',
    text:'邀請卡上只有一個神秘 LOGO、活動時間、地點，你會怎樣做？',
    options:[
      {text:'上網查出所有跟這個活動相關的資料，查完再決定要不要去', score:{J:1}},
      {text:'既然要來嘉義了，順便安排嘉義一日遊行程', score:{J:1}},
      {text:'打開地圖稍微查一下派對地點，查完就睡', score:{P:1}},
      {text:'憑感覺，感覺這個神秘又有趣，就決定要去了', score:{P:1}},
    ]
  },
  {
    id:'Q3', dim:'WD',
    scene:'火雞肉飯',
    text:'邀請卡上有一個問題，決定你會被分配到什麼桌。它問你：火雞肉飯你是拌還是不拌派？',
    options:[
      {text:'直接拌開，加調味料，吃得夠味最重要', score:{W:1}, sub:'S'},
      {text:'拌！無論咖哩、還是火雞肉飯都要拌', score:{W:1}, sub:'S'},
      {text:'先問老闆這家店的火雞肉飯有什麼故事', score:{D:1}, sub:'H'},
      {text:'絕對不拌！一口一口慢慢吃', score:{D:1}, sub:'L'},
    ]
  },
  {
    id:'Q4', dim:'EI',
    scene:'到達現場',
    text:'到達「串燒辦桌」派對現場，有一群人正在門口排隊，你的狀態是？',
    options:[
      {text:'覺得這種場合很有趣，忍不住開始東看西看、甚至想找人聊幾句', score:{E:1}},
      {text:'善用排隊時間，拍照打卡，第一時間分享給好友', score:{E:1}, sub:'V'},
      {text:'很怕跟其他人對到眼，低頭滑手機祈禱趕快進場', score:{I:1}},
      {text:'默默地觀察其他人，心裡雖然很興奮，但還是表現冷靜', score:{I:1}},
    ]
  },
  {
    id:'Q5', dim:'EI',
    scene:'入座後',
    text:'終於入座了，派對正式開始！大家開始吃串燒，隔壁的陌生人主動跟你搭話，你會？',
    options:[
      {text:'很自然聊起來，甚至延伸話題、交換更多資訊', score:{E:1}},
      {text:'會回應對方，但聊天維持在輕鬆、不過深的程度', score:{E:1}},
      {text:'簡單回應後，感覺不太對 tone，把話題慢慢收掉', score:{I:1}},
      {text:'禮貌回應後，會借上廁所的藉口先結束話題', score:{I:1}},
    ]
  },
  {
    id:'Q6', dim:'JP',
    scene:'派對中場',
    text:'辦桌進行到一半，你發現還有很多攤位沒逛，但時間有限，你會怎麼安排？',
    options:[
      {text:'拿出手機，把剩下想去的攤位全部列清單排順序', score:{J:1}},
      {text:'先確認還有幾個攤是一定要去的，其他隨緣', score:{J:1}},
      {text:'想到哪就去哪，反正跟著感覺走', score:{P:1}},
      {text:'跟旁邊的人聊聊，看他們推薦哪個再決定', score:{P:1}},
    ]
  },
  {
    id:'Q7', dim:'WD',
    scene:'炭火攤位',
    text:'經過一個攤位，廚師正在用炭火烤串，火光很吸引人，你會？',
    options:[
      {text:'被香味和畫面吸引，邊看邊吃，享受當下的熱鬧與美味', score:{W:1}, sub:'S'},
      {text:'主動問老闆炭火、食材或手法，想知道為什麼要這樣做', score:{D:1}, sub:'H'},
      {text:'拍下攤位的細節，然後問老闆食材是哪來的', score:{W:1}, sub:'V'},
      {text:'默默觀察攤位的細節擺設和廚師的節奏與狀態', score:{D:1}, sub:'L'},
    ]
  },
  {
    id:'Q8', dim:'WD',
    scene:'餘興節目',
    text:'辦桌接近尾聲，台上正在進行特別節目：職人現場火烤秀，現在徵求一位觀眾一起體驗。你的反應是？',
    options:[
      {text:'舉手參加！想親手體驗烤串過程', score:{D:1}, sub:'工藝'},
      {text:'跑到舞台前，很好奇想要近距離觀賞細節', score:{D:1}, sub:'L'},
      {text:'跑去找最好的拍攝角度，把職人火烤秀拍下來', score:{W:1}, sub:'V'},
      {text:'表演看夠了，走去其他攤位繼續探索新東西', score:{W:1}, sub:'S'},
    ]
  },
  {
    id:'Q9', dim:'JP',
    scene:'派對結束',
    text:'派對結束了，聽到同桌有人在討論要不要續攤，你會？',
    options:[
      {text:'先確認幾點，去哪裡，認真評估才決定要不要去', score:{J:1}},
      {text:'影響到下一個行程，決定不要去', score:{J:1}},
      {text:'聽起來很有趣，當下就決定去吧', score:{P:1}},
      {text:'看現場氣氛，大家想去就去，不想去就算了', score:{P:1}},
    ]
  },
  {
    id:'Q10', dim:'WD',
    scene:'離場前',
    text:'最後，你要踏出派對現場時，有一個很漂亮的打卡拍照區在介紹本次活動，你會？',
    options:[
      {text:'先找角度、光線，拍出最好看的畫面', score:{W:1}, sub:'V'},

// ── 計分邏輯 ──
let scores = {E:0,I:0,J:0,P:0,W:0,D:0};
let subs = {S:0,V:0,H:0,L:0,工藝:0};
let current = 0;
const history = [];

function calcResult(){
  const E = scores.E >= 2 ? 'E' : 'I';
  const J = scores.J >= 2 ? 'J' : 'P';
  const W = scores.W >= 3 ? 'W' : scores.D >= 3 ? 'D' : (subs.S+subs.V >= subs.H+subs.L+subs.工藝 ? 'W' : 'D');

  if(E==='E' && J==='J' && W==='W') return 'EJW';
  if(E==='E' && J==='J' && W==='D') return 'EJD';
  if(E==='E' && J==='P' && W==='W') return 'EPW';
  if(E==='I' && J==='P' && W==='W') return 'IPW';
  if(E==='E' && J==='P' && W==='D'){
    return subs.H >= subs.L ? 'EPD_H' : 'EPD_L';
  }
  if(E==='I' && J==='J' && W==='D') return 'IJD';
  if(E==='I' && J==='P' && W==='D') return 'IPD';
  // IJW → 無對應串，靠 E/I 分數導向
  if(E==='I' && J==='J' && W==='W'){
    return scores.E > 0 ? 'EJW' : 'IPW';
  }
  return 'EJW';
}

function startQuiz(){
  scores = {E:0,I:0,J:0,P:0,W:0,D:0};
  Object.assign(subs,{S:0,V:0,H:0,L:0,工藝:0});
  current = 0;
  history.length = 0;
  document.getElementById('splash').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion(){
  const q = questions[current];
  const pct = (current/questions.length)*100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = 'Q '+(current+1)+' / '+questions.length;

  const area = document.getElementById('questionArea');
  area.innerHTML = `
    <div class="question-block">
      <div class="q-number">Q${current+1} · ${q.dim}</div>
      <div class="q-scene">${q.scene}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o,i)=>`
          <button class="option-btn" onclick="selectOption(${i})">${o.text}</button>
        `).join('')}
      </div>
      ${current > 0 ? `<button class="back-q-btn" onclick="goBack()">← 上一題</button>` : ''}
    </div>
  `;
}

function selectOption(i){
  const q = questions[current];
  const opt = q.options[i];
  history.push({q: current, i, prevScores: {...scores}, prevSubs: {...subs}});
  Object.entries(opt.score).forEach(([k,v])=>{ scores[k] = (scores[k]||0) + v; });
  if(opt.sub) subs[opt.sub] = (subs[opt.sub]||0) + 1;
  current++;
  if(current >= questions.length) showResult();
  else renderQuestion();
}

function goBack(){
  if(history.length === 0) return;
  const prev = history.pop();
  Object.assign(scores, prev.prevScores);
  Object.assign(subs, prev.prevSubs);
  current = prev.q;
  renderQuestion();
}

function showResult(){
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const key = calcResult();
  const r = results[key];

  const hero = document.getElementById('resultHero');
  hero.className = 'result-hero '+r.heroClass;
  document.getElementById('resultTag').textContent = r.mbti;
  document.getElementById('resultIcon').textContent = r.icon;
  document.getElementById('rarityBadge').textContent = '稀有度 '+r.rarity;
  document.getElementById('resultName').textContent = r.name;
  document.getElementById('resultSubtitle').textContent = r.subtitle;
  document.getElementById('resultDesc').textContent = r.desc;
  document.getElementById('resultOther').textContent = r.other;

  const tagsEl = document.getElementById('resultTags');
  tagsEl.innerHTML = r.flags.map(f=>`<span class="flag-tag">${f}</span>`).join('');

  const spotsEl = document.getElementById('resultSpots');
  spotsEl.innerHTML = r.spots.map(s=>`
    <div class="spot-row">
      <div class="spot-dot" style="background:${r.dotColor}"></div>
      <div class="spot-name">${s}</div>
    </div>
  `).join('');

  const partnerEl = document.getElementById('resultPartner');
  partnerEl.innerHTML = `
    <div class="partner-card">
      <div class="partner-label">✅ 適合一起玩</div>
      <div class="partner-names">${r.partner.yes.join('<br>')}</div>
    </div>
    <div class="partner-card">
      <div class="partner-label">❌ 不太合拍</div>
      <div class="partner-names">${r.partner.no.join('<br>')}</div>
    </div>
  `;

  document.getElementById('resultQuote').textContent = r.quote;

  if(r.special){
    const sp = document.createElement('p');
    sp.style.cssText = 'font-size:.85rem;color:#aaa;line-height:1.7;margin-top:1rem;text-align:center;';
    sp.textContent = r.special;
    document.getElementById('resultQuote').after(sp);
  }

  window.scrollTo(0,0);
  saveResult(key);
}

  document.getElementById('result').style.display = 'none';
  const sp = document.querySelector('.result-body p[style]');
  if(sp) sp.remove();
  document.getElementById('splash').style.display = 'flex';
}

}

  renderAdminStats(demo);
}

function renderAdminStats(data){
  const total = Object.values(data).reduce((a,b)=>a+b,0);
  document.getElementById('adminTotal').textContent = total;
  const order = ['EJW','EJD','EPW','IPW','EPD_L','EPD_H','IJD','IPD'];
  const el = document.getElementById('adminStats');
  el.innerHTML = order.map(k=>{
    const r = results[k];
    if(!r) return '';
    const n = data[k]||0;
    const pct = total ? Math.round(n/total*100) : 0;
    return `
      <div class="stat-row">
        <div class="stat-name"><span>${r.icon}</span>${r.name}</div>
        <div class="stat-num">${n}</div>
        <div class="stat-pct">${pct}%</div>
      </div>
    `;
  }).join('');
}

function saveResult(key){
  if(!BIN_ID) return;
  fetch(`${API_BASE}/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}})
    .then(r=>r.json()).then(d=>{
      const rec = d.record||{};
      rec[key] = (rec[key]||0)+1;
      return fetch(`${API_BASE}/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)});
    }).catch(()=>{});
}

window.addEventListener('load', checkAdmin);
</script>
