<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是哪一種嘉義串？｜文化＋1串！</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');
:root {
  --black: #111;
  --white: #FAFAFA;
  --y: #F5E642;
  --r: #FF4A1C;
  --p: #FF8FCB;
  --b: #00AEEF;
  --g: #2ECC40;
  --br: #C8902A;
  --s: #A8A8B3;
  --yw: #F7C948;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Noto Serif TC',serif;min-height:100vh;overflow-x:hidden;}

/* SPLASH */
#splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden;}
.bg-strips{position:absolute;inset:0;display:flex;}
.bg-strip{flex:1;opacity:0.07;}
.s1{background:var(--r);}.s2{background:var(--p);}.s3{background:var(--b);}.s4{background:var(--g);}
.s5{background:var(--br);}.s6{background:var(--s);}.s7{background:var(--yw);}.s8{background:var(--y);}
.splash-badge{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.3em;color:var(--y);border:1px solid var(--y);padding:.3rem 1rem;margin-bottom:2rem;text-transform:uppercase;animation:fadeUp .6s ease both;}
.splash-title{font-size:clamp(2.6rem,7vw,5.5rem);font-weight:900;line-height:1;text-align:center;animation:fadeUp .6s .1s ease both;}
.splash-title .accent{color:var(--y);display:block;}
.splash-sub{margin-top:1.5rem;font-size:1rem;color:#aaa;text-align:center;line-height:1.8;max-width:440px;animation:fadeUp .6s .2s ease both;}
.splash-types{display:flex;gap:.6rem;margin-top:2rem;flex-wrap:wrap;justify-content:center;animation:fadeUp .6s .3s ease both;}
.type-pill{padding:.35rem 1rem;font-size:.78rem;font-weight:700;letter-spacing:.04em;}
.tp-r{background:var(--r);color:#fff;}.tp-p{background:var(--p);color:#111;}
.tp-b{background:var(--b);color:#111;}.tp-g{background:var(--g);color:#111;}
.tp-br{background:var(--br);color:#fff;}.tp-s{background:var(--s);color:#111;}
.tp-yw{background:var(--yw);color:#111;}.tp-y{background:var(--y);color:#111;}
.start-btn{margin-top:3rem;background:var(--white);color:var(--black);border:none;padding:1.1rem 3.5rem;font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:900;cursor:pointer;letter-spacing:.1em;transition:background .2s,transform .15s;animation:fadeUp .6s .4s ease both;}
.start-btn:hover{background:var(--y);transform:scale(1.04);}

/* QUIZ */
#quiz{display:none;min-height:100vh;padding:2rem 1rem 4rem;max-width:680px;margin:0 auto;}
.progress-bar-wrap{height:4px;background:#333;margin-bottom:.6rem;}
.progress-bar-fill{height:100%;background:var(--y);transition:width .4s ease;}
.progress-label{font-family:'Space Mono',monospace;font-size:.7rem;color:#666;margin-bottom:2.5rem;letter-spacing:.15em;}
.question-block{animation:fadeUp .4s ease both;}
.q-number{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--y);letter-spacing:.3em;margin-bottom:1rem;}
.q-text{font-size:clamp(1.15rem,3vw,1.5rem);font-weight:700;line-height:1.5;margin-bottom:2rem;}
.options{display:flex;flex-direction:column;gap:.75rem;}
.option-btn{background:transparent;border:1px solid #333;color:var(--white);padding:1rem 1.4rem;text-align:left;font-family:'Noto Serif TC',serif;font-size:.95rem;line-height:1.5;cursor:pointer;transition:border-color .2s,background .2s,transform .1s;position:relative;}
.option-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .2s;}
.option-btn:hover{border-color:var(--y);background:rgba(245,230,66,.05);transform:translateX(4px);}
.option-btn:hover::before{background:var(--y);}
.option-btn.selected{border-color:var(--y);background:rgba(245,230,66,.12);}
.option-btn.selected::before{background:var(--y);}

/* RESULT */
#result{display:none;min-height:100vh;}
.result-hero{padding:3.5rem 2rem 2.5rem;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden;}
.rh-r{background:var(--r);color:#fff;}.rh-p{background:var(--p);color:#111;}
.rh-b{background:var(--b);color:#111;}.rh-g{background:var(--g);color:#111;}
.rh-br{background:var(--br);color:#fff;}.rh-s{background:var(--s);color:#111;}
.rh-yw{background:var(--yw);color:#111;}.rh-y{background:var(--y);color:#111;}
.result-tag{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.3em;padding:.3rem .8rem;border:1.5px solid currentColor;margin-bottom:1.2rem;opacity:.7;animation:fadeUp .5s ease both;}
.char-wrap{width:160px;height:160px;margin-bottom:1.2rem;animation:fadeUp .5s .05s ease both,floatAnim 3s ease-in-out infinite;}
@keyframes floatAnim{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.rarity-badge{font-family:'Space Mono',monospace;font-size:.65rem;padding:.25rem .8rem;background:rgba(0,0,0,.2);border-radius:99px;margin-bottom:1rem;letter-spacing:.1em;animation:fadeUp .5s .08s ease both;}
.result-type-name{font-size:clamp(2.8rem,9vw,5.5rem);font-weight:900;line-height:.95;animation:fadeUp .5s .1s ease both;}
.result-subtitle{font-size:.95rem;margin-top:.8rem;opacity:.75;animation:fadeUp .5s .2s ease both;}
.result-body{background:var(--black);color:var(--white);padding:2.5rem 1.5rem 4rem;max-width:680px;margin:0 auto;}
.result-desc{font-size:1rem;line-height:1.9;color:#ddd;margin-bottom:2rem;animation:fadeUp .5s .3s ease both;}
.result-ip-desc{font-size:.95rem;line-height:1.8;color:#ccc;margin-bottom:2rem;padding:1rem 1.2rem;border-left:3px solid currentColor;background:rgba(255,255,255,.04);animation:fadeUp .5s .31s ease both;font-style:italic;}
.result-other-desc{font-size:.9rem;line-height:1.8;color:#aaa;margin-bottom:2rem;border-left:2px solid #333;padding-left:1rem;animation:fadeUp .5s .32s ease both;}

.section-label{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.3em;color:#666;margin-bottom:.8rem;}
.result-spots{display:flex;flex-direction:column;gap:0;margin-bottom:2rem;animation:fadeUp .5s .35s ease both;}
.spot-row{display:flex;align-items:flex-start;gap:.8rem;padding:.6rem 0;border-bottom:1px solid #1e1e1e;}
.spot-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:.45rem;}
.spot-info{flex:1;}
.spot-name{font-size:.9rem;color:#ddd;font-weight:700;}
.spot-note{font-size:.78rem;color:#666;margin-top:.15rem;}

.tags-wrap{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2rem;animation:fadeUp .5s .38s ease both;}
.flag-tag{font-size:.78rem;color:#888;border:1px solid #2a2a2a;padding:.3rem .7rem;}

.partner-wrap{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:2rem;animation:fadeUp .5s .4s ease both;}
.partner-card{border:1px solid #1e1e1e;padding:.9rem 1rem;}
.partner-label{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.2em;color:#555;margin-bottom:.5rem;}
.partner-names{font-size:.88rem;color:#ccc;line-height:1.6;}

.quote-block{border-left:3px solid var(--y);padding:.8rem 1.2rem;margin-bottom:2rem;font-size:.95rem;color:#ccc;font-style:italic;line-height:1.7;animation:fadeUp .5s .42s ease both;}

/* CTA */
.cta-section{margin-bottom:2.5rem;animation:fadeUp .5s .45s ease both;}
.cta-buttons{display:flex;flex-direction:column;gap:.75rem;}
.cta-btn{display:flex;align-items:center;gap:1rem;padding:1rem 1.4rem;border:1px solid #333;color:var(--white);text-decoration:none;font-family:'Noto Serif TC',serif;font-size:.95rem;transition:border-color .2s,background .2s,transform .1s;position:relative;}
.cta-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.cta-btn.line-btn::before{background:#06C755;}
.cta-btn.ig-btn::before{background:#E1306C;}
.cta-btn.map-btn::before{background:var(--b);}
.cta-btn:hover{background:rgba(255,255,255,.05);transform:translateX(4px);border-color:#555;}
.cta-icon{font-size:1.3rem;flex-shrink:0;}
.cta-text{flex:1;}
.cta-text strong{display:block;font-size:.95rem;margin-bottom:.15rem;}
.cta-text span{font-size:.78rem;color:#888;}
.cta-arrow{color:#555;font-size:.9rem;}
.retry-btn{background:transparent;border:1px solid #444;color:#888;padding:.9rem 2.5rem;font-family:'Noto Serif TC',serif;font-size:.9rem;cursor:pointer;transition:border-color .2s,color .2s;letter-spacing:.1em;animation:fadeUp .5s .55s ease both;}
.retry-btn:hover{border-color:var(--white);color:var(--white);}
.back-q-btn{background:transparent;border:none;color:#555;padding:.6rem 0 0;font-family:'Noto Serif TC',serif;font-size:.82rem;cursor:pointer;transition:color .2s;letter-spacing:.05em;display:block;margin-top:.5rem;}
.back-q-btn:hover{color:#aaa;}

/* ADMIN */
#admin{display:none;min-height:100vh;padding:3rem 1.5rem;max-width:800px;margin:0 auto;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem;}
.admin-title{font-size:1.4rem;font-weight:900;}
.admin-sub{font-family:'Space Mono',monospace;font-size:.62rem;color:#666;letter-spacing:.2em;margin-top:.3rem;}
.refresh-btn{background:transparent;border:1px solid #444;color:#aaa;padding:.6rem 1.2rem;font-family:'Space Mono',monospace;font-size:.7rem;cursor:pointer;letter-spacing:.1em;transition:border-color .2s,color .2s;}
.refresh-btn:hover{border-color:var(--y);color:var(--y);}
.stat-total-row{border-top:1px solid #222;padding-top:1.5rem;display:flex;align-items:baseline;gap:.8rem;margin-bottom:2rem;}
.stat-total-num{font-size:2rem;font-weight:900;font-family:'Space Mono',monospace;color:var(--y);}
.stat-total-label{color:#666;font-size:.85rem;}
.stats-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:3rem;}
.stat-row{display:grid;grid-template-columns:1fr 60px 80px;align-items:center;gap:1rem;padding:.9rem 1rem;border:1px solid #1e1e1e;}
.stat-name{font-size:.92rem;font-weight:700;display:flex;align-items:center;gap:.6rem;}
.stat-bar-col{position:relative;height:4px;background:#222;}
.stat-bar-inner{height:100%;transition:width .8s ease;}
.stat-num{font-family:'Space Mono',monospace;font-size:.8rem;color:#888;text-align:right;}
.stat-pct{font-family:'Space Mono',monospace;font-size:.75rem;color:#555;}
.admin-loading{color:#666;font-size:.9rem;text-align:center;padding:3rem;}
.admin-error{color:#ff6b6b;font-size:.85rem;text-align:center;padding:2rem;border:1px solid #ff6b6b33;}
.back-btn{background:transparent;border:1px solid #333;color:#888;padding:.8rem 1.8rem;font-family:'Noto Serif TC',serif;font-size:.85rem;cursor:pointer;transition:border-color .2s,color .2s;}
.back-btn:hover{border-color:var(--white);color:var(--white);}

/* PW MODAL */
.pw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;}
.pw-overlay.active{display:flex;}
.pw-box{background:#1a1a1a;border:1px solid #333;padding:2.5rem;width:90%;max-width:360px;text-align:center;}
.pw-title{font-weight:700;font-size:1.1rem;margin-bottom:.5rem;}
.pw-sub{color:#666;font-size:.85rem;margin-bottom:1.5rem;}
.pw-input{width:100%;background:#111;border:1px solid #333;color:var(--white);padding:.8rem 1rem;font-size:1rem;text-align:center;letter-spacing:.2em;margin-bottom:1rem;font-family:'Space Mono',monospace;}
.pw-input:focus{outline:none;border-color:var(--y);}
.pw-btn{width:100%;background:var(--y);color:var(--black);border:none;padding:.9rem;font-weight:900;font-size:1rem;cursor:pointer;font-family:'Noto Serif TC',serif;}
.pw-error{color:var(--r);font-size:.8rem;margin-top:.75rem;display:none;}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:480px){
  .splash-title{font-size:2.4rem;}
  .result-type-name{font-size:3rem;}
  .partner-wrap{grid-template-columns:1fr;}
}
</style>
</head>

// ══════════════════════════════════════
//  題目：雙軸計分
//  每個選項帶兩個分數維度：
//  travel: E(說走就走)/P(計劃控)/J(彈性)
//  culture: S(感官)/H(人文)/M(混合)
//  同時也累積對各串的直接加分
// ══════════════════════════════════════

  {

      {text:'走一條這趟沒走過的街，看能遇到什麼', travel:'J', culture:'M', bonus:'surp'},
      {text:'去預約好的體驗，把東西做完帶回去', travel:'J', culture:'S', bonus:'wood'},

    ]
  }

// 判斷邏輯矩陣（旅遊屬性 × 文化偏好 → 候選串，再用 bonus 決勝）
const TYPE_MATRIX = {
  'E_S': ['hot','sweet'],
  'E_M': ['surp','hot'],
  'E_H': ['surp','old'],
  'J_S': ['wood','surp'],
  'J_M': ['surp','wood'],
  'J_H': ['old','ice'],
  'P_S': ['wood','local'],
  'P_M': ['tech','local'],
  'P_H': ['ice','tech','old','local'],
};

// ══════════════════════════════════════
//  狀態
// ══════════════════════════════════════
let travelScores = {E:0, P:0, J:0};
let cultureScores = {S:0, H:0, M:0};
let bonusScores = {hot:0,surp:0,sweet:0,ice:0,wood:0,old:0,tech:0,local:0};
let currentQ = 0;
let answers = []; // 儲存每題答案 {travel, culture, bonus}

// ══════════════════════════════════════
//  測驗邏輯
// ══════════════════════════════════════
function startQuiz(){
  document.getElementById('splash').style.display='none';
  document.getElementById('quiz').style.display='block';
  renderQuestion();
}

function renderQuestion(){
  const q = QUESTIONS[currentQ];
  const pct = (currentQ / QUESTIONS.length)*100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `Q ${currentQ+1} / ${QUESTIONS.length}`;
  const block = document.getElementById('questionBlock');
  block.style.animation='none'; block.offsetHeight; block.style.animation='';
  const backBtn = currentQ > 0
    ? `<button class="back-q-btn" onclick="goBack()">← 上一題</button>`
    : '';
  block.innerHTML = `
    <div class="q-number">QUESTION ${String(currentQ+1).padStart(2,'0')}</div>
    <div class="q-text">${q.text}</div>
    <div class="options">
      ${q.options.map(o=>`<button class="option-btn" onclick="selectOption(this,'${o.travel}','${o.culture}','${o.bonus}')">${o.text}</button>`).join('')}
    </div>
    ${backBtn}`;
}

function selectOption(btn, travel, culture, bonus){
  document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  setTimeout(()=>{
    // 儲存這題的答案
    answers[currentQ] = {travel, culture, bonus};
    travelScores[travel]++;
    cultureScores[culture]++;
    bonusScores[bonus]++;
    currentQ++;
    currentQ < QUESTIONS.length ? renderQuestion() : showResult();
  }, 320);
}

function goBack(){
  if(currentQ <= 0) return;
  // 還原上一題的分數
  const prev = answers[currentQ - 1];
  if(prev){
    travelScores[prev.travel]--;
    cultureScores[prev.culture]--;
    bonusScores[prev.bonus]--;
    answers.splice(currentQ - 1, 1);
  }
  currentQ--;
  renderQuestion();
}

function calcResult(){
  // 主軸判斷
  const topTravel = Object.entries(travelScores).sort((a,b)=>b[1]-a[1])[0][0];
  const topCulture = Object.entries(cultureScores).sort((a,b)=>b[1]-a[1])[0][0];
  const key = topTravel+'_'+topCulture;
  const candidates = TYPE_MATRIX[key] || Object.keys(RESULTS);
  // 在候選人裡找 bonus 最高的
  let winner = candidates[0];
  let best = -1;
  candidates.forEach(c=>{ if(bonusScores[c]>best){best=bonusScores[c];winner=c;} });
  // 如果候選人都沒有 bonus，直接用 bonus 最高的
  const globalBest = Object.entries(bonusScores).sort((a,b)=>b[1]-a[1])[0][0];
  if(best===0) winner = globalBest;
  return winner;
}

function showResult(){
  const winner = calcResult();
  const r = RESULTS[winner];
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';

  const hero = document.getElementById('resultHero');
  hero.className = 'result-hero '+r.heroClass;
  document.getElementById('charWrap').innerHTML = CHARS[winner];
  document.getElementById('rarityBadge').textContent = r.rarity;
  document.getElementById('resultTypeName').textContent = r.emoji+' '+r.name;
  document.getElementById('resultSubtitle').textContent = r.subtitle;
  document.getElementById('resultDesc').textContent = r.desc;
  document.getElementById('resultOtherDesc').textContent = '別人眼中的你：'+r.otherDesc;

  document.getElementById('resultTags').innerHTML = r.tags.map(t=>`<span class="flag-tag">${t}</span>`).join('');

  document.getElementById('resultSpots').innerHTML = r.spots.map(s=>`
    <div class="spot-row">
      <span class="spot-dot" style="background:${r.dotColor}"></span>
      <div class="spot-info"><div class="spot-name">${s.name}</div><div class="spot-note">${s.note}</div></div>
    </div>`).join('');

  document.getElementById('partnerWrap').innerHTML = `
    <div class="partner-card">
      <div class="partner-label">💚 超合拍旅伴</div>
      <div class="partner-names">${r.good.join('、')}</div>
    </div>
    <div class="partner-card">
      <div class="partner-label">❤️ 有點挑戰</div>
      <div class="partner-names">${r.bad.join('、')}</div>
    </div>`;

  document.getElementById('resultQuote').textContent = r.quote;

  const mapLink = CONFIG.MAP_LINKS[winner];
  document.getElementById('ctaButtons').innerHTML = `
    <a class="cta-btn line-btn" href="https://lin.ee/RNRpMCj" target="_blank" rel="noopener">
      <span class="cta-icon">💬</span>
      <span class="cta-text"><strong>加入文化＋1串！LINE</strong><span>獲得更多站點資訊與活動通知</span></span>
      <span class="cta-arrow">→</span>
    </a>
    <a class="cta-btn ig-btn" href="https://www.instagram.com/ccc.chiayi/" target="_blank" rel="noopener">
      <span class="cta-icon">📸</span>
      <span class="cta-text"><strong>追蹤 IG @ccc.chiayi</strong><span>看看其他人的嘉義文化串旅行</span></span>
      <span class="cta-arrow">→</span>
    </a>
    <a class="cta-btn map-btn" href="${mapLink}" target="_blank" rel="noopener">
      <span class="cta-icon">📍</span>
      <span class="cta-text"><strong>查看推薦站點地圖</strong><span>探索你的${r.name}路線</span></span>
      <span class="cta-arrow">→</span>
    </a>`;

  sendToSheet(winner);
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════
//  Google Sheets 串接
// ══════════════════════════════════════
function sendToSheet(type){
  if(!CONFIG.APPS_SCRIPT_URL||CONFIG.APPS_SCRIPT_URL.includes('請貼上')) return;
  fetch(CONFIG.APPS_SCRIPT_URL+'?type='+type+'&t='+Date.now(),{method:'GET',mode:'no-cors'}).catch(()=>{});
}

function loadAdminStats(){
  const el = document.getElementById('adminContent');
  el.innerHTML='<div class="admin-loading">從 Google 試算表載入數據中…</div>';
  if(!CONFIG.APPS_SCRIPT_URL||CONFIG.APPS_SCRIPT_URL.includes('請貼上')){
    el.innerHTML='<div class="admin-error">⚠️ 尚未設定 Apps Script URL</div>'; return;
  }
  fetch(CONFIG.APPS_SCRIPT_URL+'?action=stats&t='+Date.now())
    .then(r=>r.json()).then(renderAdminStats)
    .catch(()=>{ el.innerHTML='<div class="admin-error">⚠️ 無法取得數據，請確認 Apps Script 設定正確。</div>'; });
}

function renderAdminStats(data){
  const keys=['hot','surp','sweet','ice','wood','old','tech','local'];
  const total = keys.reduce((s,k)=>s+(data[k]||0),0);
  const pct = n => total>0?Math.round((n/total)*100):0;
  const rows = keys.map(k=>{
    const r=RESULTS[k]; const n=data[k]||0;
    return `<div class="stat-row">
      <div class="stat-name"><span style="width:8px;height:8px;border-radius:50%;background:${r.dotColor};display:inline-block;flex-shrink:0"></span>${r.emoji} ${r.name}</div>
      <div style="flex:1;position:relative;height:4px;background:#222;margin:0 .5rem">
        <div style="position:absolute;left:0;top:0;height:100%;width:${pct(n)}%;background:${r.dotColor};transition:width .8s ease"></div>
      </div>
      <div class="stat-num">${n} <span class="stat-pct">${pct(n)}%</span></div>
    </div>`;
  }).join('');
  document.getElementById('adminContent').innerHTML=`
    <div class="stat-total-row">
      <span class="stat-total-num">${total}</span>
      <span class="stat-total-label">總填答人數</span>
    </div>
    <div class="stats-list">${rows}</div>`;
}

// ══════════════════════════════════════
//  後台密碼
// ══════════════════════════════════════
function openAdmin(){
  document.getElementById('pwOverlay').classList.add('active');
  setTimeout(()=>document.getElementById('pwInput').focus(),100);
}
function checkPw(){
  const v=document.getElementById('pwInput').value;
  if(v===CONFIG.ADMIN_PASSWORD){
    document.getElementById('pwOverlay').classList.remove('active');
    document.getElementById('pwInput').value='';
    document.getElementById('pwError').style.display='none';
    ['result','splash','quiz'].forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById('splash').style.display='none';
    document.getElementById('admin').style.display='block';
    loadAdminStats();
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    document.getElementById('pwError').style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
function goHome(){
  document.getElementById('admin').style.display='none';
  document.getElementById('splash').style.display='flex';
}
function resetQuiz(){
  travelScores={E:0,P:0,J:0};
  cultureScores={S:0,H:0,M:0};
  bonusScores={hot:0,surp:0,sweet:0,ice:0,wood:0,old:0,tech:0,local:0};
  answers=[];
  currentQ=0;
  document.getElementById('result').style.display='none';
  document.getElementById('splash').style.display='flex';
}
if(location.hash==='#admin') openAdmin();
