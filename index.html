//  Q1 Q4 Q7 → E vs I

let scores = {E:0,I:0,J:0,P:0,W:0,D:0};
let answers = [];
let currentQ = 0;

function getResult(){
  const ei = scores.E >= scores.I ? 'E' : 'I';
  const jp = scores.J >= scores.P ? 'J' : 'P';
  const wd = scores.W >= scores.D ? 'W' : 'D';
  return ei+jp+wd;
}

function startQuiz(){
  scores={E:0,I:0,J:0,P:0,W:0,D:0};
  answers=[];currentQ=0;
  document.getElementById('splash').style.display='none';
  document.getElementById('quiz').style.display='block';
  renderQuestion();
}

function renderQuestion(){
  const q=QUESTIONS[currentQ];
  const pct=(currentQ/QUESTIONS.length)*100;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent='Q '+(currentQ+1)+' / 10';
  const optionsHtml = q.options.map((o,i)=>
    `<button class="option-btn" onclick="selectAnswer(${i})">${o.text}</button>`
  ).join('');
  const html=`
    <div class="q-number">Q ${String(currentQ+1).padStart(2,'0')}</div>
    <div class="q-text">${q.text}</div>
    <div class="options">${optionsHtml}</div>
    ${currentQ>0?`<button class="back-q-btn" onclick="goBack()">← 上一題</button>`:''}
  `;
  document.getElementById('questionBlock').innerHTML=html;
  document.getElementById('questionBlock').style.animation='none';
  requestAnimationFrame(()=>{document.getElementById('questionBlock').style.animation='fadeUp .4s ease both';});
}

function selectAnswer(idx){
  const q=QUESTIONS[currentQ];
  const opt=q.options[idx];
  // 記錄本題選了哪個選項及加了哪些分
  const added={};
  Object.keys(opt).forEach(k=>{
    if(scores[k]!==undefined){ scores[k]+=opt[k]; added[k]=opt[k]; }
  });
  answers.push({q:currentQ,idx,added});
  if(currentQ<QUESTIONS.length-1){currentQ++;renderQuestion();}
  else{showResult();}
}

function goBack(){
  if(currentQ<=0)return;
  const last=answers.pop();
  Object.keys(last.added).forEach(k=>{ scores[k]-=last.added[k]; });
  currentQ--;
  renderQuestion();
}

function showResult(){
  const key=getResult();
  const r=RESULTS[key];
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';
  document.getElementById('resultHero').className='result-hero '+r.heroClass;
  document.getElementById('resultIcon').textContent=r.icon;
  document.getElementById('rarityBadge').textContent=r.rarity;
  document.getElementById('resultTypeName').textContent=r.name;
  document.getElementById('resultSubtitle').textContent=r.subtitle;
  document.getElementById('resultDesc').textContent=r.desc;
  document.getElementById('resultOtherDesc').textContent=r.otherDesc;
  document.getElementById('resultTags').innerHTML=r.tags.map(t=>`<span class="flag-tag">${t}</span>`).join('');
  document.getElementById('resultSpots').innerHTML=r.spots.map(s=>`
    <div class="spot-row">
      <div class="spot-dot" style="background:${r.dotColor}"></div>
      <div class="spot-info"><div class="spot-name">${s.name}</div><div class="spot-note">${s.note}</div></div>
    </div>`).join('');
  document.getElementById('partnerWrap').innerHTML=`
    <div class="partner-card"><div class="partner-label">✅ 適合一起玩</div><div class="partner-names">${r.good.join('<br>')}</div></div>
    <div class="partner-card"><div class="partner-label">❌ 不太合拍</div><div class="partner-names">${r.bad.join('<br>')}</div></div>`;
  document.getElementById('resultQuote').textContent=r.quote;
  sendToSheet(key);
  window.scrollTo({top:0,behavior:'smooth'});
}

function sendToSheet(type){
  if(!CONFIG.APPS_SCRIPT_URL)return;
  fetch(CONFIG.APPS_SCRIPT_URL+'?type='+type+'&t='+Date.now(),{method:'GET',mode:'no-cors'}).catch(()=>{});
}

function loadAdminStats(){
  const el=document.getElementById('adminContent');
  el.innerHTML='<div class="admin-loading">從 Google 試算表載入數據中…</div>';
  fetch(CONFIG.APPS_SCRIPT_URL+'?action=stats&t='+Date.now())
    .then(r=>r.json()).then(data=>{
      const keys=['EJW','EJD','EPW','EPD','IPW','IJW','IPD','IJD'];
      const total=keys.reduce((s,k)=>s+(data[k]||0),0);
      const pct=n=>total>0?Math.round((n/total)*100):0;
      const rows=keys.map(k=>{
        const r=RESULTS[k];const n=data[k]||0;
        return `<div class="stat-row">
          <div class="stat-name"><span style="width:8px;height:8px;border-radius:50%;background:${r.dotColor};display:inline-block;flex-shrink:0"></span>${r.icon} ${r.name}</div>
          <div style="flex:1;position:relative;height:4px;background:#222;margin:0 .5rem"><div style="position:absolute;left:0;top:0;height:100%;width:${pct(n)}%;background:${r.dotColor};transition:width .8s ease"></div></div>
          <div class="stat-num">${n} <span class="stat-pct">${pct(n)}%</span></div>
        </div>`;
      }).join('');
      el.innerHTML=`<div class="stat-total-row"><span class="stat-total-num">${total}</span><span class="stat-total-label">總填答人數</span></div><div class="stats-list">${rows}</div>`;
    }).catch(()=>{el.innerHTML='<div class="admin-error">⚠️ 無法取得數據，請確認 Apps Script 設定正確。</div>';});
}

function openAdmin(){
  document.getElementById('pwOverlay').classList.add('active');
  setTimeout(()=>document.getElementById('pwInput').focus(),100);
}
function checkPw(){
  const v=document.getElementById('pwInput').value;
  if(v===CONFIG.ADMIN_PASSWORD){
    document.getElementById('pwOverlay').classList.remove('active');
    document.getElementById('pwInput').value='';
    document.getElementById('pwError').style.display='none';
    ['result','splash','quiz'].forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById('admin').style.display='block';
    loadAdminStats();window.scrollTo({top:0,behavior:'smooth'});
  }else{
    document.getElementById('pwError').style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
function goHome(){document.getElementById('admin').style.display='none';document.getElementById('splash').style.display='flex';}
function resetQuiz(){
  scores={E:0,I:0,J:0,P:0,W:0,D:0};answers=[];currentQ=0;
  document.getElementById('result').style.display='none';
  document.getElementById('splash').style.display='flex';
}
if(location.hash==='#admin')openAdmin();
